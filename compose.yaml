name: blog-engine

networks:
  blog-net:
    driver: bridge

volumes:
  astro-sites:
  git-repos:

services:
  astro-supervisor:
    pull_policy: always
    build:
      context: .
      dockerfile: astro-supervisor/Dockerfile.dev
    networks:
      - blog-net
    volumes:
      - astro-sites:/app/astro-sites
      - git-repos:/app/git-repos
    environment:
      - BACKEND_WS_URL=ws://backend:8080/api/supervisor/ws
      - SITES_DIR=/app/astro-sites
      - GIT_REPOS_DIR=/app/git-repos
      - PREVIEW_PORT=4321
    ports:
      - '4321:4321'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f astro-supervisor > /dev/null || exit 1']
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  backend:
    pull_policy: always
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    networks:
      - blog-net
    ports:
      - '8080:8080'
    volumes:
      - astro-sites:/app/astro-sites:ro
    environment:
      - SITES_DIR=/app/astro-sites
    develop:
      watch:
        - action: sync
          path: backend/src
          target: /workspace/backend/src
        - action: rebuild
          path: backend/Cargo.toml
        - action: rebuild
          path: backend/Cargo.lock
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:8080/healthz || exit 1']
      interval: 5s
      timeout: 120s
      retries: 5

  frontend:
    pull_policy: always
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    networks:
      - blog-net
    ports:
      - '3000:3000'
    environment:
      - PUBLIC_API_BACKEND_URL=http://localhost:8080
    develop:
      watch:
        - action: sync
          path: frontend/src
          target: /app/src
        - action: rebuild
          path: frontend/package.json
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000']
      interval: 5s
      timeout: 5s
      retries: 3
