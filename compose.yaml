name: blog-engine

networks:
  blog-net:
    driver: bridge

volumes:
  astro-sites:
  git-repos:

services:
  astro-server:
    build:
      context: ./astro-server
      dockerfile: Dockerfile
    networks:
      - blog-net
    volumes:
      - astro-sites:/app/astro-sites
      - git-repos:/app/git-repos
    environment:
      - PREVIEW_PORT=4321
    ports:
      - '4321:4321'

  backend:
    build:
      context: backend
      dockerfile: Dockerfile.dev
    networks:
      - blog-net
    ports:
      - '8080:8080'
    environment:
      - GIT_PROVIDER=local
    depends_on:
      - astro-server
    develop:
      watch:
        - action: sync
          path: backend/src
          target: /app/src
        - action: rebuild
          path: backend/Cargo.toml
        - action: rebuild
          path: backend/Cargo.lock
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -sf http://127.0.0.1:8080/healthz || exit 1' ]
      interval: 5s
      timeout: 120s
      retries: 5

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    networks:
      - blog-net
    ports:
      - '3000:3000'
    environment:
      - PUBLIC_API_BACKEND_URL=http://localhost:8080
    develop:
      watch:
        - action: sync
          path: frontend/src
          target: /app/src
        - action: rebuild
          path: frontend/package.json
    healthcheck:
      test: [ 'CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000' ]
      interval: 5s
      timeout: 5s
      retries: 3
