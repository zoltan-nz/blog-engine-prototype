<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <script>
      const t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);
      const f=localStorage.getItem('font-family');if(f)document.documentElement.style.setProperty('--font-family','"'+f+'",sans-serif');
      const fu=localStorage.getItem('font-url');if(fu){const l=document.createElement('link');l.rel='stylesheet';l.href=fu;document.head.appendChild(l);}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
