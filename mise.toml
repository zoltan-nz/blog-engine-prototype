[tools]
node = "latest"
pnpm = "latest"
rust = "latest"

# =============================================================================
# Dev (run in separate terminals)
# =============================================================================

[tasks.backend]
description = "Start backend with hot reload"
run = "cargo watch -x 'run --bin blog-engine-api'"
dir = "backend"

[tasks.frontend]
description = "Start frontend dev server"
run = "pnpm dev"
dir = "frontend"

[tasks.types]
description = "Update types"
run = "cargo watch -x 'run --bin export-types'"
dir = "backend"

# =============================================================================
# Build
# =============================================================================

[tasks.build-frontend]
description = "Build frontend SPA for production"
run = "pnpm build"
dir = "frontend"

[tasks.build]
description = "Build single release binary with the SPA embedded"
depends = ["build-frontend"]
run = "cargo build --release --features embed"
dir = "backend"

# =============================================================================
# Type Generation (Rust -> TypeScript via specta)
# =============================================================================

[tasks.export-types]
description = "Regenerate frontend/src/lib/types/bindings.ts from Rust wire types"
run = "cargo run --bin export-types"
dir = "backend"

# =============================================================================
# Integration Tests (Playwright starts backend via webServer)
# =============================================================================

[tasks.test]
description = "Build frontend then run Playwright"
depends = ["build-frontend"]
run = "pnpm run test"
dir = "integration-tests"

# =============================================================================
# Unit Tests
# =============================================================================

[tasks.test-unit-backend]
description = "Run Rust unit tests in watch mode"
run = "cargo watch -x test"
dir = "backend"

[tasks.test-unit-frontend]
description = "Run Vitest in watch mode"
run = "pnpm exec vitest --watch"
dir = "frontend"

[tasks.test-unit]
description = "Run all unit tests once"
run = """
echo "=== Running all unit tests ===" && \
(cd backend && cargo test) && \
(cd frontend && pnpm exec vitest run) && \
echo "=== All unit tests passed ==="
"""

# =============================================================================
# Formatting
# =============================================================================

[tasks.format]
description = "Format all code"
run = "pnpm format && (cd backend && cargo fmt)"
