[tools]
# Hey is a performance management software
hey = "latest"
node = "latest"
pnpm = "latest"
rust = "latest"

# =============================================================================
# Compose Tasks (Primary Workflow)
# =============================================================================

[tasks.up]
description = "Start all services"
run = "docker compose up --remove-orphans --build"

[tasks.up-d]
description = "Start all services detached"
run = "docker compose up --build --remove-orphans -d --wait"

[tasks.up-watch]
description = "Start all services with file watching"
run = "docker compose up --remove-orphans --build --renew-anon-volumes --watch"

[tasks.down]
description = "Stop and remove compose stack"
run = "docker compose down --remove-orphans --volumes"

[tasks.logs]
description = "Follow compose logs"
run = "docker compose logs -f"

# =============================================================================
# Integration Tests (Playwright - runs outside compose)
# =============================================================================

[tasks.test]
description = "E2E integration tests — starts stack, runs Playwright, tears down"
dir = "integration-tests"
depends = ["up-d"]
run = "pnpm run test"
depends_post = ["down"]

# =============================================================================
# Unit Tests (run outside compose, watch mode)
# =============================================================================

[tasks.test-unit-backend]
description = "Run Rust backend unit tests in watch mode"
run = "cargo watch -x test"
dir = "backend"

[tasks.test-unit-supervisor]
description = "Run astro-supervisor unit tests in watch mode"
run = "cargo watch -x test"
dir = "astro-supervisor"

[tasks.test-unit-frontend]
description = "Run SvelteKit unit tests in watch mode"
run = "pnpm exec vitest --watch"
dir = "frontend"

[tasks.test-unit]
description = "Run all unit tests"
run = """
echo "=== Running all unit tests ===" && \
(cd backend && cargo test) && \
(cd astro-supervisor && cargo test) && \
(cd frontend && pnpm exec vitest run) && \
echo "=== All unit tests passed ==="
"""

# =============================================================================
# Container Stats
# =============================================================================

[tasks.stats]
description = "Show container resource usage"
run = """
echo "=== Image Sizes ===" && docker image ls --format "table {{.Repository}}\t{{.Size}}" | grep -E "(backend|frontend|supervisor|REPOSITORY)" && echo "" && echo "=== Memory Usage ===" && docker stats --no-stream --format "table {{.Name}}\t{{.MemUsage}}" 2>/dev/null || echo "No running containers"
"""

# =============================================================================
# Production Compose Stack
# =============================================================================

[tasks.prod-up]
description = "Start production stack"
run = "docker compose -f compose.prod.yaml up --build"

[tasks.prod-down]
description = "Stop production stack"
run = "docker compose -f compose.prod.yaml down"

# =============================================================================
# Local Dev Tasks
# =============================================================================

[tasks.format]
description = "Format code in all services"
run = "pnpm format && (cd backend && cargo fmt) && (cd astro-supervisor && cargo fmt)"

[tasks.dev-backend]
description = "Start Rust backend locally (hot reload)"
run = "cargo watch -x 'run --bin blog-engine-api'"
dir = "backend"

[tasks.dev-supervisor]
description = "Run astro-supervisor locally with cargo watch"
dir = "astro-supervisor"
run = "cargo watch -x 'run --bin astro-supervisor'"

[tasks.spec-gen]
description = "Generate OpenAPI yaml from Rust backend"
run = "cargo run --bin gen-open-api-yaml"
dir = "backend"
depends_post = ["format"]

[tasks.gen-api-clients]
description = "Generate types and query clients from OpenAPI specification"
depends = ["spec-gen"]
run = "pnpm --filter frontend run generate"
