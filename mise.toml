[tools]
# Hey is a performance management software
hey = "latest"
node = "latest"
pnpm = "latest"
rust = "latest"

# =============================================================================
# Compose Tasks (Primary Workflow)
# =============================================================================

[tasks.up]
description = "Start all services (both backends + svelte) for comparison"
run = "docker compose --profile rust --profile node --profile svelte --profile react up --remove-orphans --build"

[tasks.up-d]
description = "Start all services detached"
run = "docker compose --profile rust --profile node --profile svelte --profile react up --build --remove-orphans -d --wait"

[tasks.up-rust]
description = "Start stack with Rust backend only"
run = "docker compose --profile rust up --remove-orphans --build"

[tasks.up-node]
description = "Start stack with Node backend only"
run = "docker compose --profile node up --remove-orphans --build --renew-anon-volumes"

[tasks.up-svelte-rust]
description = "Start SvelteKit + Rust backend (sweet spot combo)"
run = "docker compose --profile rust --profile svelte up --remove-orphans --build"

[tasks.up-svelte-rust-d]
description = "Start SvelteKit + Rust backend detached"
run = "docker compose --profile rust --profile svelte up --remove-orphans --build -d --wait"

[tasks.up-react-node]
description = "Start React + Node backend"
run = "docker compose --profile node --profile react up --remove-orphans --build"

[tasks.up-react-node-d]
description = "Start React + Node backend detached"
run = "docker compose --profile node --profile react up --remove-orphans --build -d --wait"

[tasks.down]
description = "Stop and remove compose stack"
run = "docker compose --profile rust --profile node --profile svelte --profile react down --remove-orphans"

[tasks.logs]
description = "Follow compose logs"
run = "docker compose logs -f"

# =============================================================================
# Integration Tests (Playwright - runs outside compose)
# =============================================================================

[tasks.test-svelte-rust]
description = "E2E test: Svelte + Rust (sweet spot) — servers start automatically"
dir = "integration-tests"
depends=["up-svelte-rust-d"]
run = "pnpm run test"
depends_post=["down"]

[tasks.test-react-node]
description = "E2E test: React + Node"
dir = "integration-tests"
depends=["up-react-node-d"]
run = "FRONTEND_URL=http://localhost:3001 BACKEND_URL=http://localhost:8081 pnpm run test"
depends_post=["down"]

[tasks.test-all-combos]
description = "E2E test all 4 frontend/backend combinations"
depends = ["test-svelte-rust", "test-react-node"]

# =============================================================================
# Unit Tests (run outside compose, watch mode)
# =============================================================================

[tasks.test-unit-rust]
description = "Run Rust backend unit tests in watch mode"
run = "cd admin-cms-app/backend-rust && cargo watch -x test"

[tasks.test-unit-node]
description = "Run Node backend unit tests in watch mode"
run = "cd admin-cms-app/backend-node && pnpm exec vitest --watch"

[tasks.test-unit-svelte]
description = "Run SvelteKit frontend unit tests in watch mode"
run = "cd admin-cms-app/frontend-svelte && pnpm exec vitest --watch"

[tasks.test-unit-react]
description = "Run React frontend unit tests in watch mode"
run = "cd admin-cms-app/frontend-react && pnpm exec vitest --watch"

[tasks.test-unit]
description = "Run all unit tests (parallel, not watch mode)"
run = """
echo "=== Running all unit tests ===" && \
(cd admin-cms-app/backend-rust && cargo test) && \
(cd admin-cms-app/backend-node && pnpm exec vitest run) && \
(cd admin-cms-app/frontend-svelte && pnpm exec vitest run) && \
(cd admin-cms-app/frontend-react && pnpm exec vitest run) && \
echo "=== All unit tests passed ==="
"""

# =============================================================================
# Container Stats
# =============================================================================

[tasks.stats]
description = "Show container resource usage"
run = """
echo "=== Image Sizes ===" && docker image ls --format "table {% raw %}{{.Repository}}\t{{.Size}}{% endraw %}" | grep -E "(backend|frontend|REPOSITORY)" && echo "" && echo "=== Memory Usage ===" && docker stats --no-stream --format "table {% raw %}{{.Name}}\t{{.MemUsage}}{% endraw %}" 2>/dev/null || echo "No running containers"
"""

# =============================================================================
# Production Compose Stack
# =============================================================================

[tasks.prod-up]
description = "Start production stack (all services)"
run = "docker compose -f compose.prod.yaml --profile rust --profile node --profile svelte --profile react up --build"

[tasks.prod-down]
description = "Stop production stack"
run = "docker compose -f compose.prod.yaml --profile rust --profile node --profile svelte --profile react down"

# =============================================================================
# Local Dev Tasks
# =============================================================================

[tasks.format]
description = "Format code in all services"
run = "pnpm format && cd admin-cms-app/backend-rust && cargo fmt"

[tasks.dev-rust]
description = "Start Rust backend locally (hot reload)"
run = "cargo watch -x 'run --bin backend-rust'"
dir = "admin-cms-app/backend-rust"

[tasks.dev-gen-open-api]
description= "Generate OpenAPI yaml from Rust backend"
run = "cargo run --bin gen_open_api_yaml"
dir = "admin-cms-app/backend-rust"
depends_post = ["format"]

[tasks.dev-gen-api-clients]
description = "Generate types and query from OpenAPI specification in the Svelte and React frontend"
depends = ["dev-gen-open-api"]
run = [
    "pnpm --filter frontend-svelte run generate",
    "pnpm --filter frontend-react run generate",
    "pnpm --filter backend-node run generate"
]